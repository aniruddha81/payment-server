services:
  payment-server:
    build:
      context: .
    container_name: hallmgmt-payment-server
    restart: unless-stopped
    ports:
      - "${PAYMENT_SERVER_PUBLIC_PORT:-8080}:${PAYMENT_SERVER_PORT:-8080}"
    environment:
      PORT: ${PAYMENT_SERVER_PORT:-8080}
      NODE_ENV: production
      MAIN_SERVER_URL: ${MAIN_SERVER_URL:-http://backend:8000}
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge
